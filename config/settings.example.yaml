scan_root: ./server/scans
watch_root: ./sample_data
database_path: ./storage/bfsai.db
poll_seconds: 3
ollama:
  enabled: true
  base_url: http://127.0.0.1:11434
  model: llama3.2:3b
  timeout_seconds: 90
thresholds:
  verified_confidence: 0.9
  flagged_amount: 50000
  total_delta_tolerance: 1.0
rails:
  enabled: true
  base_url: http://127.0.0.1:3000
  endpoint_path: /api/invoice_ingestions
  api_token: ""
  timeout_seconds: 30
  auto_ingest_approved: false
  auth_name: ""
  auth_password: ""
  login_path: /login
  clients_minimal_path: /clients_minimal
  payee_accounts_path: /payee_accounts
  client_cache_ttl_seconds: 900
extraction:
  active_strategy: legacy_local
  corpus_dir: ./storage/training_corpus
  runs_dir: ./storage/training_runs
  runtime_dir: ./storage/runtime
  strategies:
    legacy_local:
      label: Current Local System
      kind: legacy
      description: Existing OCR, heuristic extraction, vendor learning, and local review flow.
      enabled: true
    ppstruct_layoutlm_qwen:
      label: PP-StructureV3 + LayoutLMv3 + Qwen2.5-VL-7B
      kind: experimental
      description: Experimental layout-aware stack. Point qwen_base_url at a local compatible server when available.
      enabled: true
      ppstructure_command: ""
      layoutlm_model: LayoutLMv3
      qwen_base_url: ""
      qwen_model: Qwen2.5-VL-7B
      train_command: ""
      eval_command: ""
